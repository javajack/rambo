name: Deploy Docs to GitHub Pages

# Builds the Astro + Starlight docs on every push to main and deploys to GitHub Pages.
# Builds ONLY the repo-root Astro project (src/content/docs). The separate codex-docs/
# project has its own config and is never built or published by this workflow.
# `configure-pages` with enablement:true turns Pages on automatically (Source: GitHub Actions)
# so no manual Settings step is required (works once the repo can serve Pages — i.e. public,
# or private on Pro/Team/Enterprise).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages (auto-enable if not already on)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action installs deps, runs `astro build` at the repo root,
        # and uploads the Pages artifact from ./dist automatically.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
