name: Deploy Docs to GitHub Pages

# Builds the repo-root Astro + Starlight docs (src/content/docs) on every push to main and
# deploys to GitHub Pages. The separate codex-docs/ project has its own config and is never
# built or published by this workflow.
# Pages is enabled once via Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # installs deps, runs `astro build` at the repo root, and uploads
        # the Pages artifact from ./dist automatically.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
