<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X API Client Complaint Searches</title>
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(97.8% 0.006 248);
      --panel: oklch(99.2% 0.004 248);
      --panel-2: oklch(95.2% 0.008 248);
      --text: oklch(22% 0.018 248);
      --muted: oklch(52% 0.025 248);
      --line: oklch(87% 0.014 248);
      --accent: oklch(52% 0.16 245);
      --accent-dark: oklch(43% 0.15 245);
      --focus: oklch(62% 0.18 245);
      --shadow: 0 1px 2px oklch(24% 0.025 248 / 0.08), 0 12px 32px oklch(24% 0.025 248 / 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 1.85rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 72ch;
      margin: 8px 0 0;
      color: var(--muted);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 0 -8px 20px;
      padding: 12px 8px;
      background: oklch(97.8% 0.006 248 / 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .search {
      width: 100%;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .search:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px oklch(62% 0.18 245 / 0.16);
    }

    .count {
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .card[hidden] {
      display: none;
    }

    .card-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
      min-width: 0;
    }

    .title-block {
      min-width: 0;
    }

    .number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      flex: 0 0 auto;
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      margin-top: 7px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 0.78rem;
      font-weight: 650;
    }

    code {
      display: block;
      max-height: 112px;
      overflow: auto;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(94.5% 0.008 248);
      color: oklch(28% 0.024 248);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 650;
      text-decoration: none;
      cursor: pointer;
    }

    .button:hover {
      background: var(--panel-2);
    }

    .button:focus-visible {
      outline: 3px solid oklch(62% 0.18 245 / 0.24);
      outline-offset: 2px;
    }

    .button.primary {
      border-color: var(--accent-dark);
      background: var(--accent);
      color: oklch(98% 0.006 245);
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .empty {
      display: none;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      text-align: center;
    }

    .empty.visible {
      display: block;
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      header,
      .toolbar,
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.45rem;
      }

      .count {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>X API client complaint searches</h1>
        <p class="subtitle">Manual research links for complaints about Postman, Insomnia, Bruno, Hoppscotch, Yaak, Thunder Client, Paw, and API clients in general.</p>
      </div>
      <a class="button" href="x-api-client-complaint-search-links.txt">Open text file</a>
    </header>

    <section class="toolbar" aria-label="Search controls">
      <input id="filter" class="search" type="search" placeholder="Filter by product, pain, or query text" autocomplete="off">
      <div id="count" class="count">24 searches</div>
    </section>

    <section id="cards" class="grid" aria-label="X search links"></section>
    <div id="empty" class="empty">No matching searches. Clear the filter and try a broader term.</div>
  </main>

      },
      {
        title: "High-engagement complaint posts",
        category: "Priority",
        query: "(\"Postman\" OR \"Insomnia\" OR \"Bruno\" OR \"Hoppscotch\" OR \"Yaak\" OR \"Thunder Client\") (sucks OR hate OR annoying OR bloated OR broken OR expensive OR paywall OR \"forced login\") min_faves:10 lang:en -filter:retweets",
        url: "https://x.com/search?q=(%22Postman%22%20OR%20%22Insomnia%22%20OR%20%22Bruno%22%20OR%20%22Hoppscotch%22%20OR%20%22Yaak%22%20OR%20%22Thunder%20Client%22)%20(sucks%20OR%20hate%20OR%20annoying%20OR%20bloated%20OR%20broken%20OR%20expensive%20OR%20paywall%20OR%20%22forced%20login%22)%20min_faves%3A10%20lang%3Aen%20-filter%3Aretweets&src=typed_query&f=live"
      },
      {
        title: "Recent live complaint stream",
        category: "Priority",
        query: "(\"Postman\" OR \"Insomnia\" OR \"Bruno\" OR \"Hoppscotch\" OR \"Yaak\" OR \"Thunder Client\" OR \"API client\") (sucks OR hate OR annoying OR broken OR slow OR bloated OR expensive OR paywall OR \"not working\") lang:en -filter:retweets",
        url: "https://x.com/search?q=(%22Postman%22%20OR%20%22Insomnia%22%20OR%20%22Bruno%22%20OR%20%22Hoppscotch%22%20OR%20%22Yaak%22%20OR%20%22Thunder%20Client%22%20OR%20%22API%20client%22)%20(sucks%20OR%20hate%20OR%20annoying%20OR%20broken%20OR%20slow%20OR%20bloated%20OR%20expensive%20OR%20paywall%20OR%20%22not%20working%22)%20lang%3Aen%20-filter%3Aretweets&src=typed_query&f=live"
      }
    ];

    const cards = document.querySelector("#cards");
    const filter = document.querySelector("#filter");
    const count = document.querySelector("#count");
    const empty = document.querySelector("#empty");

    function render() {
      const term = filter.value.trim().toLowerCase();
      let visible = 0;

      document.querySelectorAll(".card").forEach((card) => {
        const haystack = card.dataset.search;
        const match = !term || haystack.includes(term);
        card.hidden = !match;
        if (match) visible += 1;
      });

      count.textContent = `${visible} of ${searches.length} searches`;
      empty.classList.toggle("visible", visible === 0);
    }

    function buildCards() {
      cards.innerHTML = searches.map((item, index) => `
        <article class="card" data-search="${escapeHtml([item.title, item.category, item.query].join(" ").toLowerCase())}">
          <div class="card-top">
            <div class="number">${index + 1}</div>
            <div class="title-block">
              <h2>${escapeHtml(item.title)}</h2>
              <span class="tag">${escapeHtml(item.category)}</span>
            </div>
          </div>
          <code>${escapeHtml(item.query)}</code>
          <div class="actions">
            <a class="button primary" href="${item.url}" target="_blank" rel="noreferrer">Open X search</a>
            <button class="button" type="button" data-copy="${index}">Copy query</button>
            <button class="button" type="button" data-copy-url="${index}">Copy link</button>
          </div>
        </article>
      `).join("");

      cards.addEventListener("click", async (event) => {
        const queryButton = event.target.closest("[data-copy]");
        const urlButton = event.target.closest("[data-copy-url]");
        const index = queryButton ? queryButton.dataset.copy : urlButton ? urlButton.dataset.copyUrl : null;
        if (index === null) return;

        const value = queryButton ? searches[index].query : searches[index].url;
        await copyText(value);
        const button = queryButton || urlButton;
        const oldText = button.textContent;
        button.textContent = "Copied";
        setTimeout(() => {
          button.textContent = oldText;
        }, 900);
      });
    }

    async function copyText(value) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    buildCards();
    filter.addEventListener("input", render);
    render();
  </script>
</body>
</html>
